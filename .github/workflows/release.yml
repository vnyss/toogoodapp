name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create and push version tag
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$version"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          if (git tag -l $tag) { git tag -d $tag }
          git tag $tag
          git push origin $tag --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete any existing releases for this version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$version"
          $headers = @{ Authorization = "token $env:GITHUB_TOKEN"; "User-Agent" = "CI" }
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/vnyss/toogoodapp/releases" -Headers $headers
          foreach ($r in $releases) {
            if ($r.tag_name -eq $tag) {
              Write-Host "Deleting release $($r.id) for $tag"
              Invoke-RestMethod -Method Delete -Uri "https://api.github.com/repos/vnyss/toogoodapp/releases/$($r.id)" -Headers $headers
            }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web bundle
        run: npm run build:web

      - name: Build & publish Windows installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
